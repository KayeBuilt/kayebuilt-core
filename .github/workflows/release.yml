name: Release

# Changesets-driven release: on merge to main, either opens/updates a
# "Version Packages" PR (if there are pending changesets) or, once that PR is
# merged, publishes to npm. Publishing is `--dry-run` until the @kayebuilt
# npm org actually exists — see HUMAN-TODO.md. Flip DRY_RUN to "false" once
# NPM_TOKEN is set as a repo secret and the org is created.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  DRY_RUN: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build

      - name: Create Release Pull Request or Publish
        if: env.DRY_RUN == 'false'
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish (no npm org yet — see HUMAN-TODO.md)
        if: env.DRY_RUN == 'true'
        run: pnpm -r publish --dry-run --no-git-checks --access public
